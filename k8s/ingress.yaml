apiVersion:networking.k8s.io/v1
kind: Ingress
metadata:
  name: resumeai-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: resumeai-pro.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: resumeai-service
                port:
                  number: 80
  tls:
    - hosts:
        - resumeai-pro.com
      secretName: resumeai-tls-cert
