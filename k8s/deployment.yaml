apiVersion: apps/v1
kind: Deployment
metadata:
  name: resumeai-deployment
  namespace: default
  labels:
    app: resumeai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resumeai
  template:
    metadata:
      labels:
        app: resumeai
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: resumeai-app
          image: akshaysomani/resumeai-pro:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          envFrom:
            - configMapRef:
                name: resumeai-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: resumeai-secrets
                  key: DATABASE_URL
            - name: NEXT_PUBLIC_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: resumeai-secrets
                  key: NEXT_PUBLIC_SUPABASE_URL
            - name: NEXT_PUBLIC_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: resumeai-secrets
                  key: NEXT_PUBLIC_SUPABASE_ANON_KEY
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
